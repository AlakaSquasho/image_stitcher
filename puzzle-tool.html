<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线拼图工具</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #fbf1df;
            --text-color: #3b2f1b;
            --muted-text: #6b4e2e;
            --panel-bg: rgba(255, 244, 224, 0.92);
            --panel-border: rgba(217, 119, 6, 0.28);
            --border-color: rgba(217, 119, 6, 0.3);
            --template-bg: rgba(255, 240, 214, 0.95);
            --template-active: #f59e0b;
            --button-primary: #f59e0b;
            --button-hover: #d97706;
            --button-cta: #f97316;
            --shadow: 0 12px 32px rgba(59, 47, 27, 0.14);
            --glass-blur: 14px;
            --focus-ring: 0 0 0 3px rgba(245, 158, 11, 0.35);
            --button-shadow: 0 10px 18px rgba(245, 158, 11, 0.28);        }

        [data-theme="dark"] {
            --bg-color: #0f1115;
            --text-color: #e5e7eb;
            --muted-text: #9ca3af;
            --panel-bg: rgba(24, 27, 33, 0.85);
            --panel-border: rgba(148, 163, 184, 0.2);
            --border-color: rgba(148, 163, 184, 0.2);
            --template-bg: rgba(30, 33, 40, 0.85);
            --template-active: #cbd5e1;
            --button-primary: #94a3b8;
            --button-hover: #64748b;
            --button-cta: #cbd5e1;
            --shadow: 0 14px 36px rgba(2, 6, 23, 0.55);
            --button-shadow: 0 10px 18px rgba(148, 163, 184, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s ease, color 0.3s ease;
            overflow: hidden;
            height: 100vh;
            line-height: 1.6;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        :focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }

        .header {
            height: 64px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-shadow: var(--shadow);
            z-index: 100;
            position: relative;
            backdrop-filter: blur(var(--glass-blur));
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
        }

        .theme-toggle {
            position: relative;
            width: 52px;
            height: 28px;
            background: var(--border-color);
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s ease;
            border: 1px solid transparent;
        }

        .theme-toggle:focus-visible {
            box-shadow: var(--focus-ring);
        }

        .theme-toggle:hover::after {
            opacity: 1;
        }

        .theme-toggle::after {
            content: attr(data-tooltip);
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--panel-bg);
            color: var(--text-color);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease;
            box-shadow: var(--shadow);
            pointer-events: none;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(var(--glass-blur));
            z-index: 10;
        }

        .theme-slider {
            position: absolute;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 999px;
            top: 2px;
            left: 2px;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 8px rgba(15, 23, 42, 0.2);
        }

        [data-theme="dark"] .theme-toggle {
            background: var(--button-primary);
        }

        [data-theme="dark"] .theme-slider {
            transform: translateX(24px);
        }

        .main-container {
            display: flex;
            height: calc(100vh - 64px);
            gap: 18px;
            padding: 18px;
        }

        .sidebar {
            width: 220px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 20px;
            border-radius: 16px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            backdrop-filter: blur(var(--glass-blur));
        }

        .sidebar h3 {
            margin-bottom: 16px;
            font-size: 15px;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .template-grid {
            display: grid;
            gap: 16px;
        }

        .template-item {
            background: var(--template-bg);
            border: 1px solid rgba(217, 119, 6, 0.18);
            border-radius: 14px;
            padding: 14px;
            cursor: pointer;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            min-height: 88px;
            font-family: inherit;
            color: var(--text-color);
            appearance: none;
            width: 100%;
        }

        [data-theme="dark"] .template-item {
            border-color: rgba(148, 163, 184, 0.2);
        }

        .template-item:active {
            transform: translateY(1px);
        }

        .template-item:hover {
            border-color: var(--button-primary);
            box-shadow: 0 10px 18px rgba(245, 158, 11, 0.2);
        }

        .template-item:focus-visible {
            box-shadow: var(--focus-ring);
        }

        .template-item.active {
            border-color: var(--template-active);
            background: color-mix(in srgb, var(--template-active) 16%, var(--template-bg));
            box-shadow: 0 12px 24px rgba(245, 158, 11, 0.25);
        }

        .template-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-bottom: 10px;
            min-height: 30px;
            align-items: center;
        }

        .template-rect {
            width: 12px;
            height: 12px;
            background: var(--button-primary);
            border-radius: 3px;
        }

        .template-ellipsis {
            font-size: 12px;
            color: var(--muted-text);
            margin-left: 3px;
        }

        .template-name {
            font-size: 13px;
            font-weight: 500;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: transparent;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .canvas-container > .canvas-wrapper {
            margin: auto;
        }

        .canvas-wrapper.has-template {
            border-style: solid;
            border-color: var(--button-primary);
            border-width: 2px;
        }

        .drop-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 20px;
            min-height: 100%;
            align-items: center;
            align-content: center;
            justify-content: center;
        }

        .drop-zone.grid-2x2,
        .drop-zone.grid-3x3 {
            gap: 12px;
            justify-content: center;
            align-content: center;
        }

        .drop-zone.grid-2x2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            justify-content: center;
            align-content: center;
        }

        .drop-zone.grid-3x3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            justify-content: center;
            align-content: center;
        }

        .drop-zone.horizontal {
            flex-direction: row;
        }

        .drop-zone.vertical {
            flex-direction: column;
        }

        .image-slot {
            border: 1px dashed rgba(217, 119, 6, 0.55);
            border-radius: 16px;
            min-width: 120px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--template-bg);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        [data-theme="dark"] .image-slot {
            border-color: rgba(148, 163, 184, 0.45);
        }

        .image-slot:focus-visible {
            box-shadow: var(--focus-ring);
        }

        .image-slot.drag-over {
            border-color: var(--button-primary);
            background: color-mix(in srgb, var(--button-primary) 10%, var(--template-bg));
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
        }

        .image-slot.has-image {
            border-style: solid;
            border-color: var(--button-primary);
        }

        .image-slot img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .image-placeholder {
            text-align: center;
            color: var(--muted-text);
            font-size: 13px;
            line-height: 1.4;
        }

        .toolbar {
            width: 260px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 20px;
            border-radius: 16px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            backdrop-filter: blur(var(--glass-blur));
        }

        .toolbar h3 {
            margin-bottom: 18px;
            font-size: 15px;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .tool-group {
            margin-bottom: 22px;
        }

        .tool-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted-text);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .form-control {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-color);
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        [data-theme="dark"] .form-control {
            background: rgba(15, 23, 42, 0.85);
        }

        .form-control::placeholder {
            color: rgba(71, 85, 105, 0.7);
        }

        [data-theme="dark"] .form-control::placeholder {
            color: rgba(148, 163, 184, 0.7);
        }

        .form-control:focus {
            border-color: var(--button-primary);
            box-shadow: var(--focus-ring);
            outline: none;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
        }

        .btn-primary {
            background: var(--button-primary);
            color: white;
            box-shadow: var(--button-shadow);
        }

        .btn-primary:hover {
            background: var(--button-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-primary span {
            display: inline-flex;
            align-items: center;
        }

        .btn-primary span svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .no-template {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--muted-text);
            padding: 24px;
        }

        .no-template-content h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .no-template-content p {
            color: var(--muted-text);
            font-size: 14px;
        }

        .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .image-slot:hover .remove-btn {
            display: flex;
        }

        .remove-btn:hover {
            background: rgba(220, 38, 38, 0.95);
        }

        @media (max-width: 1024px) {
            .main-container {
                gap: 12px;
                padding: 12px;
            }

            .sidebar {
                width: 200px;
            }

            .toolbar {
                width: 240px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }

            .sidebar, .toolbar {
                width: 100%;
                height: auto;
                max-height: 220px;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 10px;
            }

            .canvas-wrapper {
                min-width: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">在线拼图工具</div>
        <button class="theme-toggle" type="button" data-tooltip="切换主题模式" onclick="toggleTheme()" aria-label="切换主题模式">
            <span class="sr-only">切换主题</span>
            <div class="theme-slider"></div>
        </button>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <h3>模板选择</h3>
            <div class="template-grid">
                <button class="template-item" type="button" data-template="horizontal" onclick="selectTemplate('horizontal')" aria-label="选择横向拼接模板" aria-pressed="false">
                    <div class="template-preview">
                        <div class="template-rect"></div>
                        <div class="template-rect"></div>
                        <div class="template-rect"></div>
                        <div class="template-ellipsis">...</div>
                    </div>
                    <div class="template-name">横向拼接</div>
                </button>

                <button class="template-item" type="button" data-template="vertical" onclick="selectTemplate('vertical')" aria-label="选择纵向拼接模板" aria-pressed="false">
                    <div class="template-preview" style="flex-direction: column;">
                        <div class="template-rect"></div>
                        <div class="template-rect"></div>
                        <div class="template-ellipsis">...</div>
                    </div>
                    <div class="template-name">纵向拼接</div>
                </button>

                <button class="template-item" type="button" data-template="grid2x2" onclick="selectTemplate('grid2x2')" aria-label="选择 2x2 拼接模板" aria-pressed="false">
                    <div class="template-preview" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; width: 32px; height: 32px; margin: 0 auto 8px;">
                        <div class="template-rect"></div>
                        <div class="template-rect"></div>
                        <div class="template-rect"></div>
                        <div class="template-rect"></div>
                    </div>
                    <div class="template-name">2x2 拼接</div>
                </button>
                <button class="template-item" type="button" data-template="grid3x3" onclick="selectTemplate('grid3x3')" aria-label="选择 3x3 拼接模板" aria-pressed="false">
                    <div class="template-preview" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; width: 32px; height: 32px; margin: 0 auto 8px;">
                        <div class="template-rect"></div><div class="template-rect"></div><div class="template-rect"></div>
                        <div class="template-rect"></div><div class="template-rect"></div><div class="template-rect"></div>
                        <div class="template-rect"></div><div class="template-rect"></div><div class="template-rect"></div>
                    </div>
                    <div class="template-name">3x3 拼接</div>
                </button>
            </div>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <div class="canvas-wrapper" id="canvasWrapper">
                <div class="no-template" id="noTemplate">
                    <div class="no-template-content">
                        <h3>选择拼图模板开始</h3>
                        <p>从左侧选择一个模板，然后拖拽图片到画布中</p>
                    </div>
                </div>
                <div class="drop-zone" id="dropZone" style="display: none;"></div>
            </div>
        </div>

        <div class="toolbar">
            <h3>工具栏</h3>
            
            <div class="tool-group">
                <label>图片数量</label>
                <input type="number" class="form-control" id="imageCount" value="3" min="2" max="100" style="display: none;" onchange="updateTemplate()">
                <div class="form-control" id="fixedCount" style="display: none; background: var(--template-bg); cursor: not-allowed;">4 张图片</div>
            </div>

            <div class="tool-group">
                <label for="zoomSlider">显示比例</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="range" id="zoomSlider" min="1" max="200" value="100" style="flex: 1;" oninput="updateZoom()">
                    <span id="zoomValue" style="width: 45px; text-align: right;">100%</span>
                </div>
            </div>

            <div class="tool-group">
                <label>导出格式</label>
                <select class="form-control" id="exportFormat">
                    <option value="png">PNG 格式</option>
                    <option value="jpg">JPG 格式</option>
                    <option value="webp">WEBP 格式</option>
                </select>
            </div>

            <div class="tool-group">
                <button class="btn btn-primary" id="exportBtn" onclick="exportImage()" disabled aria-live="polite">
                    <span aria-hidden="true">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M6 4h9a2 2 0 0 1 2 2v3"></path>
                            <path d="M6 10H5a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5a2 2 0 0 0-2-2h-1"></path>
                            <path d="M12 12v6"></path>
                            <path d="m9 15 3 3 3-3"></path>
                        </svg>
                    </span>
                    导出图片
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentTemplate = null;
        let images = [];

        // 主题切换
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? null : 'dark';
            body.setAttribute('data-theme', newTheme || '');
            localStorage.setItem('theme', newTheme || 'light');

            const themeToggle = document.querySelector('.theme-toggle');
            if (themeToggle) {
                themeToggle.setAttribute('aria-pressed', newTheme === 'dark' ? 'true' : 'false');
            }
        }

        // 加载保存的主题
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }

            const themeToggle = document.querySelector('.theme-toggle');
            if (themeToggle) {
                themeToggle.setAttribute('aria-pressed', savedTheme === 'dark' ? 'true' : 'false');
            }
        }

        // 选择模板
        function selectTemplate(template) {
            // 移除之前的活跃状态
            document.querySelectorAll('.template-item').forEach(item => {
                item.classList.remove('active');
                item.setAttribute('aria-pressed', 'false');
            });

            // 添加新的活跃状态
            const activeTemplate = document.querySelector(`[data-template="${template}"]`);
            activeTemplate.classList.add('active');
            activeTemplate.setAttribute('aria-pressed', 'true');

            currentTemplate = template;
            images = [];

            // 显示对应的控件
            const countSelect = document.getElementById('imageCount');
            const fixedCount = document.getElementById('fixedCount');
            const canvasWrapper = document.getElementById('canvasWrapper');

            canvasWrapper.classList.remove('template-horizontal', 'template-vertical', 'template-grid');
            if (template === 'horizontal') {
                canvasWrapper.classList.add('template-horizontal');
            } else if (template === 'vertical') {
                canvasWrapper.classList.add('template-vertical');
            } else if (template === 'grid2x2' || template === 'grid3x3') {
                canvasWrapper.classList.add('template-grid');
            }

            if (template === 'horizontal' || template === 'vertical') {
                countSelect.style.display = 'block';
                fixedCount.style.display = 'none';
            } else if (template === 'grid2x2') {
                countSelect.style.display = 'none';
                fixedCount.style.display = 'block';
                fixedCount.textContent = '4 张图片';
            } else if (template === 'grid3x3') {
                countSelect.style.display = 'none';
                fixedCount.style.display = 'block';
                fixedCount.textContent = '9 张图片';
            }
            
            updateTemplate();
        }

        // 更新模板
        function updateTemplate() {
            const noTemplate = document.getElementById('noTemplate');
            const dropZone = document.getElementById('dropZone');
            const canvasWrapper = document.getElementById('canvasWrapper');

            if (!currentTemplate) {
                noTemplate.style.display = 'flex';
                dropZone.style.display = 'none';
                canvasWrapper.classList.remove('has-template');
                return;
            }

            noTemplate.style.display = 'none';
            dropZone.style.display = 'flex';
            canvasWrapper.classList.add('has-template');
            
            // 清空现有内容
            dropZone.innerHTML = '';
            dropZone.className = 'drop-zone';
            
            let slotCount = 3;
            
            if (currentTemplate === 'horizontal') {
                dropZone.classList.add('horizontal');
                slotCount = parseInt(document.getElementById('imageCount').value);
            } else if (currentTemplate === 'vertical') {
                dropZone.classList.add('vertical');
                slotCount = parseInt(document.getElementById('imageCount').value);
            } else if (currentTemplate === 'grid2x2') {
                dropZone.classList.add('grid-2x2');
                slotCount = 4;
            } else if (currentTemplate === 'grid3x3') {
                dropZone.classList.add('grid-3x3');
                slotCount = 9;
            }
            
            // 创建图片槽位
            for (let i = 0; i < slotCount; i++) {
                const slot = document.createElement('div');
                slot.className = 'image-slot';
                slot.dataset.index = i;
                slot.setAttribute('role', 'button');
                slot.setAttribute('tabindex', '0');
                slot.setAttribute('aria-label', `图片槽位 ${i + 1}，点击选择或拖拽图片`);
                
                const placeholder = document.createElement('div');
                placeholder.className = 'image-placeholder';
                placeholder.innerHTML = `<div>拖拽图片到此处</div><div style="font-size: 12px; margin-top: 5px;">或点击选择</div>`;
                slot.appendChild(placeholder);
                
                // 添加删除按钮
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeImage(i);
                };
                slot.appendChild(removeBtn);
                
                // 添加事件监听
                setupSlotEvents(slot, i);
                
                dropZone.appendChild(slot);
            }
            updateZoom();
            updateExportButton();
        }

        // 获取当前槽位数量
        function getCurrentSlotCount() {
            if (!currentTemplate) return 0;
            if (currentTemplate === 'horizontal' || currentTemplate === 'vertical') {
                return parseInt(document.getElementById('imageCount').value);
            }
            if (currentTemplate === 'grid2x2') return 4;
            if (currentTemplate === 'grid3x3') return 9;
            return 0;
        }

        // 确保槽位数量足够（仅可变模板）
        function ensureSlotCount(targetCount) {
            if (currentTemplate !== 'horizontal' && currentTemplate !== 'vertical') return;
            const countSelect = document.getElementById('imageCount');
            const currentCount = parseInt(countSelect.value);
            if (targetCount > currentCount) {
                countSelect.value = targetCount;
                updateTemplate();
            }
        }

        function getDropTargetIndices(startIndex, fileCount) {
            const currentCount = getCurrentSlotCount();
            const requiredCount = startIndex + fileCount;

            if ((currentTemplate === 'horizontal' || currentTemplate === 'vertical') && requiredCount > currentCount) {
                ensureSlotCount(requiredCount);
            }

            const finalCount = getCurrentSlotCount();
            const available = Math.max(0, finalCount - startIndex);
            const count = Math.min(fileCount, available);
            return Array.from({ length: count }, (_, i) => startIndex + i);
        }

        function handleFilesSequential(imageFiles, startIndex) {
            if (imageFiles.length === 0) return;
            const indices = getDropTargetIndices(startIndex, imageFiles.length);
            const overflow = imageFiles.length > indices.length;

            indices.forEach((slotIndex, i) => {
                const file = imageFiles[i];
                if (file) {
                    loadImageFile(file, slotIndex);
                }
            });

            if (overflow && (currentTemplate === 'grid2x2' || currentTemplate === 'grid3x3')) {
                alert('图片数量超过模板容量，已填满可用槽位');
            }
        }

        // 设置槽位事件
        function setupSlotEvents(slot, index) {
            // 点击选择文件
            slot.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.multiple = true;
                input.onchange = (e) => {
                    const files = Array.from(e.target.files);
                    const imageFiles = files.filter(file => file.type.startsWith('image/'));
                    handleFilesSequential(imageFiles, index);
                };
                input.click();
            });

            slot.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    slot.click();
                }
            });

            // 拖拽事件
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                slot.classList.add('drag-over');
            });

            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drag-over');
            });

            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');

                const files = Array.from(e.dataTransfer.files);
                const imageFiles = files.filter(file => file.type.startsWith('image/'));

                handleFilesSequential(imageFiles, index);
            });
        }

        // 加载图片文件
        function loadImageFile(file, index) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    images[index] = {
                        src: e.target.result,
                        file: file,
                        width: img.width,
                        height: img.height
                    };
                    
                    updateSlot(index);
                    updateExportButton();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 更新槽位显示
        function updateSlot(index) {
            const slot = document.querySelector(`[data-index="${index}"]`);
            const placeholder = slot.querySelector('.image-placeholder');
            
            if (images[index]) {
                slot.classList.add('has-image');
                placeholder.innerHTML = `<img src="${images[index].src}" alt="Image ${index + 1}">`;
            } else {
                slot.classList.remove('has-image');
                placeholder.innerHTML = `<div>拖拽图片到此处</div><div style="font-size: 12px; margin-top: 5px;">或点击选择</div>`;
            }
        }

        // 删除图片
        function removeImage(index) {
            delete images[index];
            updateSlot(index);
            updateExportButton();
        }

        function updateZoom() {
            const slider = document.getElementById('zoomSlider');
            const valueDisplay = document.getElementById('zoomValue');
            const canvasWrapper = document.getElementById('canvasWrapper');

            const zoomLevel = slider ? slider.value : 100;
            const scale = zoomLevel / 100;

            canvasWrapper.style.transformOrigin = 'center center';
            canvasWrapper.style.transform = `scale(${scale})`;
            valueDisplay.textContent = `${zoomLevel}%`;
        }

        function applyViewMode() {
            const canvasWrapper = document.getElementById('canvasWrapper');
            if (isOriginalSize) {
                canvasWrapper.classList.add('original-size');
            } else {
                canvasWrapper.classList.remove('original-size');
            }
        }
        // 更新导出按钮状态
        function updateExportButton() {
            const exportBtn = document.getElementById('exportBtn');
            const hasImages = Object.keys(images).length > 0;
            exportBtn.disabled = !hasImages || !currentTemplate;
        }

        // 导出图片
        async function exportImage() {
            if (!currentTemplate || Object.keys(images).length === 0) {
                alert('请先选择模板并添加图片');
                return;
            }
            
            const format = document.getElementById('exportFormat').value;
            
            try {
                // 创建画布
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 计算拼接后的尺寸
                const { width, height, layout } = calculateCanvasSize();
                canvas.width = width;
                canvas.height = height;
                
                // 填充白色背景
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, height);
                
                // 绘制图片
                await drawImages(ctx, layout);
                
                // 导出图片
                const mimeType = format === 'jpg' ? 'image/jpeg' : `image/${format}`;
                const quality = format === 'jpg' ? 0.9 : undefined;
                
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `puzzle-${Date.now()}.${format}`;
                    a.click();
                    URL.revokeObjectURL(url);
                }, mimeType, quality);
                
            } catch (error) {
                console.error('导出失败:', error);
                alert('导出失败，请检查图片是否正确加载');
            }
        }

        // 计算画布尺寸
        function calculateCanvasSize() {
            const validImages = Object.values(images).filter(img => img);
            if (validImages.length === 0) return { width: 400, height: 300, layout: [] };

            let layout = [];
            let totalWidth = 0;
            let totalHeight = 0;
            const gap = 0; // 可以设置图片间距

            if (currentTemplate === 'horizontal') {
                const maxHeight = Math.max(...validImages.map(img => img.height));
                totalHeight = maxHeight;
                let currentX = 0;
                Object.keys(images).sort((a, b) => parseInt(a) - parseInt(b)).forEach(key => {
                    if (images[key]) {
                        const img = images[key];
                        const scaledWidth = (img.width * maxHeight) / img.height;
                        layout.push({ image: img, dx: currentX, dy: 0, dWidth: scaledWidth, dHeight: maxHeight });
                        currentX += scaledWidth + gap;
                    }
                });
                totalWidth = currentX - gap;
            } else if (currentTemplate === 'vertical') {
                const maxWidth = Math.max(...validImages.map(img => img.width));
                totalWidth = maxWidth;
                let currentY = 0;
                Object.keys(images).sort((a, b) => parseInt(a) - parseInt(b)).forEach(key => {
                    if (images[key]) {
                        const img = images[key];
                        const scaledHeight = (img.height * maxWidth) / img.width;
                        layout.push({ image: img, dx: 0, dy: currentY, dWidth: maxWidth, dHeight: scaledHeight });
                        currentY += scaledHeight + gap;
                    }
                });
                totalHeight = currentY - gap;
            } else if (currentTemplate === 'grid2x2' || currentTemplate === 'grid3x3') {
                const gridSize = currentTemplate === 'grid2x2' ? 2 : 3;
                const cellWidth = Math.max(...validImages.map(img => img ? img.width : 0)) || 400;
                const cellHeight = Math.max(...validImages.map(img => img ? img.height : 0)) || 300;
                
                totalWidth = (cellWidth * gridSize) + (gap * (gridSize - 1));
                totalHeight = (cellHeight * gridSize) + (gap * (gridSize - 1));
                
                for (let i = 0; i < gridSize * gridSize; i++) {
                    if (images[i]) {
                        const row = Math.floor(i / gridSize);
                        const col = i % gridSize;
                        layout.push({
                            image: images[i],
                            dx: col * (cellWidth + gap),
                            dy: row * (cellHeight + gap),
                            dWidth: cellWidth,
                            dHeight: cellHeight
                        });
                    }
                }
            }

            return { width: totalWidth || 400, height: totalHeight || 300, layout };
        }

// 绘制图片到画布
async function drawImages(ctx, layout) {
    for (const item of layout) {
        const img = new Image();
        await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
            img.src = item.image.src;
        });

        // 保持比例居中裁剪
        const imgRatio = img.width / img.height;
        const cellRatio = item.dWidth / item.dHeight;
        let sx, sy, sWidth, sHeight;

        if (imgRatio > cellRatio) { // 图片更宽，需裁剪左右
            sHeight = img.height;
            sWidth = sHeight * cellRatio;
            sx = (img.width - sWidth) / 2;
            sy = 0;
        } else { // 图片更高，需裁剪上下
            sWidth = img.width;
            sHeight = sWidth / cellRatio;
            sx = 0;
            sy = (img.height - sHeight) / 2;
        }
        
        ctx.drawImage(img, sx, sy, sWidth, sHeight, item.dx, item.dy, item.dWidth, item.dHeight);
    }
}

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            
            // 防止页面默认的拖拽行为
            document.addEventListener('dragover', (e) => e.preventDefault());
            document.addEventListener('drop', (e) => e.preventDefault());

                // 添加粘贴事件监听
            document.addEventListener('paste', (e) => {
                const items = e.clipboardData.items;
                for (const item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        const file = item.getAsFile();
                        // 寻找第一个可用的空槽位
                        const availableSlot = document.querySelector('.image-slot:not(.has-image)');
                        if (availableSlot) {
                            const index = parseInt(availableSlot.dataset.index);
                            loadImageFile(file, index);
                        } else {
                            alert('没有可用的图片槽位来粘贴图片。');
                        }
                        e.preventDefault();
                        return;
                    }
                }
            });
        });

        // 添加键盘快捷键支持
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + E 导出
            if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
                e.preventDefault();
                if (!document.getElementById('exportBtn').disabled) {
                    exportImage();
                }
            }

            // Ctrl/Cmd + D 切换主题
            if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                e.preventDefault();
                toggleTheme();
            }
        });

        window.addEventListener('resize', updateZoom);
    </script>
</body>
